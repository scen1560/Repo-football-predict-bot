name: Daily Football Predict Bot

on:
  schedule:
    - cron: '0 23 * * *'   # 香港時間每日早上 07:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'   # 加速下次安裝

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade requests pandas "python-telegram-bot>=20"

      - name: Run prediction script
        run: python predict.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
